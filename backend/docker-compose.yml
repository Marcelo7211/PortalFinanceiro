version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: portal_financeiro_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: portal_financeiro
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - '3308:3306'
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  db_data: