version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: portal_financeiro_db_prod
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: portal_financeiro
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - portal_network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: portal_financeiro_backend
    ports:
      - '3001:3001'
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=portal_financeiro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - portal_network

  frontend:
    build: 
      context: ./Portal-Financeiro-Corretagem-White-Label-
      dockerfile: Dockerfile
    container_name: portal_financeiro_frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - portal_network

volumes:
  db_data:

networks:
  portal_network:
    driver: bridge
